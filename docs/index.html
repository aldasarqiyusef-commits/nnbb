<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NNBB لعبة تجريبية</title>
  <style>
    body { margin: 0; font-family: Tahoma, sans-serif; background: #121212; color: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 900px; width: 100%; }
    canvas { background: #1b1b2f; border: 4px solid #3f51b5; display: block; margin: 0 auto; }
    .info { margin: 12px 0; }
    .btn { cursor: pointer; border: none; padding: 10px 18px; color: #fff; background: #4caf50; font-size: 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NNBB لعبة تجريبية</h1>
    <p class="info">اضغط الأسهم أو WASD لتحريك اللاعب وجمع النقاط. اجمع 10 عملات للفوز.</p>
    <div class="info"><strong>النتيجة:</strong> <span id="score">0</span> / 10</div>
    <canvas id="gameCanvas" width="700" height="420"></canvas>
    <div class="info" id="message"></div>
    <button class="btn" id="restart">إعادة التشغيل</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restart');

    const player = { x: 80, y: 80, size: 28, speed: 4, color: '#e91e63' };
    const coin = { x: 0, y: 0, size: 16, color: '#ffeb3b' };
    let score = 0;
    let running = true;
    const targetScore = 10;
    const keys = {};

    function randomPosition() {
      const padding = 40;
      coin.x = Math.floor(Math.random() * (canvas.width - padding * 2)) + padding;
      coin.y = Math.floor(Math.random() * (canvas.height - padding * 2)) + padding;
    }

    function drawRect(obj) {
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x - obj.size / 2, obj.y - obj.size / 2, obj.size, obj.size);
    }

    function draw() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawRect({ ...player, size: player.size, color: player.color });
      drawRect({ ...coin, size: coin.size, color: coin.color });
    }

    function update() {
      if (!running) return;
      if (keys.ArrowUp || keys.w) player.y -= player.speed;
      if (keys.ArrowDown || keys.s) player.y += player.speed;
      if (keys.ArrowLeft || keys.a) player.x -= player.speed;
      if (keys.ArrowRight || keys.d) player.x += player.speed;

      player.x = Math.max(player.size / 2, Math.min(canvas.width - player.size / 2, player.x));
      player.y = Math.max(player.size / 2, Math.min(canvas.height - player.size / 2, player.y));

      const dx = player.x - coin.x;
      const dy = player.y - coin.y;
      if (Math.hypot(dx, dy) < (player.size + coin.size) / 2) {
        score += 1;
        scoreEl.textContent = score;
        if (score >= targetScore) {
          messageEl.textContent = 'مبروك! فزت في اللعبة.';
          running = false;
        } else {
          randomPosition();
        }
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    restartBtn.addEventListener('click', () => {
      score = 0;
      scoreEl.textContent = score;
      messageEl.textContent = '';
      player.x = 80;
      player.y = 80;
      running = true;
      randomPosition();
    });

    randomPosition();
    loop();
  </script>
</body>
</html>
